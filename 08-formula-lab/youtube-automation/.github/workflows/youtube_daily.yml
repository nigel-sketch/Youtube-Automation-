name: YouTube Daily Upload

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC daily
  workflow_dispatch:        # manual trigger from Actions UI for testing

permissions:
  contents: write           # needed to commit updated upload_log.json back to repo

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (ffmpeg for MoviePy)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube pipeline
        run: python pipeline_auto.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Commit updated upload log
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/upload_log.json
          git diff --staged --quiet || git commit -m "chore: log upload [skip ci]"
          git push

      - name: Report failure
        if: failure()
        run: |
          echo "::error::YouTube pipeline failed. Check logs above."
          echo "::error::Common causes: expired refresh token, API quota, ffmpeg render error."
